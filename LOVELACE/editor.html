<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%A7%91%E2%80%8D%F0%9F%94%AC%3C/text%3E%3C/svg%3E">
  <title>Эмодзи-программирование</title>
  <script src="../section-auth.js"></script>
  <script>window.SectionAuth && window.SectionAuth.guardPage("LOVELACE", { requiredProfile: "CLASSIC" });</script>
  <style>
    @font-face {
      font-family: "Noto Color Emoji";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src:
        url("https://cdn.jsdelivr.net/fontsource/fonts/noto-color-emoji@latest/emoji-400-normal.woff2") format("woff2"),
        url("https://cdn.jsdelivr.net/fontsource/fonts/noto-color-emoji@latest/emoji-400-normal.ttf") format("truetype");
    }

    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --danger-bg: #fee2e2;
      --danger-fg: #991b1b;
      --ok-bg: #dcfce7;
      --ok-fg: #166534;
      --warn-bg: #fef3c7;
      --warn-fg: #92400e;
      --emoji-font: "Noto Color Emoji", "Twemoji Mozilla", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Sans", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0%, #ffffff, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      padding: 8px;
    }

    body.konami-dark {
      --bg: #0b1220;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #60a5fa;
      --accent-strong: #3b82f6;
      --danger-bg: #3b1212;
      --danger-fg: #fecaca;
      --ok-bg: #0f2d1f;
      --ok-fg: #bbf7d0;
      --warn-bg: #3a2a0b;
      --warn-fg: #fde68a;
      background: radial-gradient(circle at 20% 0%, #1f2937, var(--bg));
      color-scheme: dark;
    }

    body.konami-dark .app {
      background: #0f172a;
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.45);
    }

    body.konami-dark .panel {
      background: #111827;
    }

    body.konami-dark .title {
      color: #bfdbfe;
      border-bottom-color: #1d4ed8;
    }

    body.konami-dark h2,
    body.konami-dark .block-title {
      color: #bfdbfe;
      border-bottom-color: #1e3a8a;
    }

    body.konami-dark .back-link {
      color: #dbeafe;
      background: #1d4ed8;
      border-color: #3b82f6;
    }

    body.konami-dark .back-link:hover {
      background: #2563eb;
      border-color: #60a5fa;
    }

    body.konami-dark #codePhrasePanel {
      background: linear-gradient(180deg, #3b2a08, #2a1e07);
      border-color: #f59e0b;
      box-shadow:
        0 0 0 2px rgba(245, 158, 11, 0.22),
        0 12px 28px rgba(0, 0, 0, 0.35);
    }

    body.konami-dark button {
      background: #1f2937;
      color: #e5e7eb;
      border-color: #475569;
    }

    body.konami-dark button:hover {
      background: #273449;
      border-color: #64748b;
    }

    body.konami-dark button:disabled {
      background: #172131;
      color: #7b8798;
      border-color: #334155;
    }

    body.konami-dark button.primary {
      background: #2563eb;
      color: #eff6ff;
      border-color: #3b82f6;
    }

    body.konami-dark button.primary:hover {
      background: #1d4ed8;
      border-color: #60a5fa;
    }

    body.konami-dark .switchers button[aria-pressed="true"] {
      background: #1d4ed8;
      color: #eff6ff;
      border-color: #60a5fa;
    }

    body.konami-dark textarea,
    body.konami-dark .text-input {
      background: #111827;
      color: #e5e7eb;
      border-color: #475569;
    }

    body.konami-dark textarea::placeholder,
    body.konami-dark .text-input::placeholder {
      color: #94a3b8;
    }

    body.konami-dark textarea:focus,
    body.konami-dark .text-input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.15);
    }

    body.konami-dark .code-lines {
      background: #0f172a;
      color: #94a3b8;
      border-color: #334155;
    }

    body.konami-dark .code-input {
      background: #111827;
      color: #f8fafc;
      border-color: #3b82f6;
    }

    body.konami-dark .emoji-group,
    body.konami-dark .editor-nav,
    body.konami-dark .test-item,
    body.konami-dark .test-item-output {
      background: #1f2937;
      border-color: #475569;
    }

    body.konami-dark .task-text {
      background: #111827;
      border-color: #475569;
      color: #e5e7eb;
    }

    body.konami-dark .status-box {
      background: #111827;
      border-color: #475569;
      color: #e5e7eb;
    }

    body.konami-dark .test-item-output.ok {
      background: #0f2d1f;
      border-color: #166534;
    }

    body.konami-dark .test-item-output.error {
      background: #3b1212;
      border-color: #7f1d1d;
    }

    body.konami-dark .test-item-output.warn {
      background: #3a2a0b;
      border-color: #92400e;
    }

    body.konami-dark .emoji-btn,
    body.konami-dark .nav-btn {
      background: #111827;
      border-color: #64748b;
      color: #e5e7eb;
    }

    body.konami-dark .nav-title {
      color: #cbd5e1;
    }

    body.konami-dark .emoji-btn:hover,
    body.konami-dark .nav-btn:hover {
      background: #1f2937;
      border-color: #93c5fd;
    }

    body.konami-dark .mini-title,
    body.konami-dark label,
    body.konami-dark .task-text-wrap,
    body.konami-dark .inline-output-label,
    body.konami-dark .test-output-label,
    body.konami-dark .test-output-meta,
    body.konami-dark .test-label {
      color: #cbd5e1;
    }

    body.konami-dark .test-item-output.ok .test-output-meta {
      color: #4ade80;
    }

    body.konami-dark .test-item-output.error .test-output-meta {
      color: #fca5a5;
    }

    body.konami-dark .test-item-output.warn .test-output-meta {
      color: #fcd34d;
    }

    body.konami-dark .icon-btn {
      color: #cbd5e1;
    }

    .app {
      width: min(1800px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.09);
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(1.35rem, 2vw, 1.8rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #1e3a8a;
      padding-bottom: 4px;
      border-bottom: 2px solid #dbeafe;
    }

    .back-link {
      text-decoration: none;
      border: 1px solid #93c5fd;
      border-radius: 10px;
      color: #1d4ed8;
      background: #dbeafe;
      padding: 8px 12px;
      font-weight: 700;
      transition: 120ms ease;
    }

    .back-link:hover {
      border-color: #60a5fa;
      background: #bfdbfe;
      transform: translateY(-1px);
    }

    .blocks {
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(250px, 18%) minmax(520px, 1fr) minmax(320px, 28%);
      align-items: start;
    }

    .blocks-col {
      min-width: 0;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .blocks > .blocks-col:first-child {
      gap: 8px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fcfcfd;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .blocks > .blocks-col:first-child > .panel {
      padding: 10px;
      gap: 8px;
    }

    .panel[hidden] {
      display: none !important;
    }

    #codePhrasePanel {
      border-color: #f59e0b;
      background: linear-gradient(180deg, #fff7ed, #fffbeb);
      box-shadow:
        0 0 0 2px rgba(245, 158, 11, 0.22),
        0 12px 28px rgba(245, 158, 11, 0.18);
    }

    h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      color: #1e3a8a;
    }

    .block-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e3a8a;
      padding-bottom: 6px;
      border-bottom: 1px solid #dbeafe;
    }

    .block-num {
      display: none !important;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
      flex: 0 0 auto;
    }

    .switchers {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .switchers-main {
      min-width: 0;
    }

    .switchers-row {
      grid-column: 1 / -1;
      min-width: 0;
      border-top: 1px solid #e5e7eb;
      padding-top: 8px;
    }

    .mini-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 6px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      transition: 120ms ease;
      resize: vertical;
    }

    .text-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      transition: 120ms ease;
      font: inherit;
    }

    .text-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .emoji-field {
      font-family: var(--emoji-font);
      font-size: 18px;
      line-height: 1.45;
    }

    .code-editor {
      display: grid;
      grid-template-columns: auto 1fr;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      min-height: clamp(360px, 58vh, 760px);
    }

    .code-editor:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .editor-workspace {
      display: grid;
      grid-template-columns: minmax(220px, 30%) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .editor-pane,
    .keyboard-pane {
      min-width: 0;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .code-lines {
      width: 84px;
      min-width: 84px;
      min-height: clamp(360px, 58vh, 760px);
      border: none;
      border-right: 1px solid #e5e7eb;
      border-radius: 0;
      background: #f8fafc;
      color: #64748b;
      text-align: right;
      resize: none;
      overflow: hidden;
      padding: 10px 8px;
      letter-spacing: 0;
      word-spacing: 0;
      font-variant-ligatures: none;
      user-select: none;
      pointer-events: none;
    }

    .code-lines:focus {
      box-shadow: none;
      border-color: #e5e7eb;
    }

    .code-input {
      min-height: clamp(360px, 58vh, 760px);
      border: none;
      border-radius: 0;
      background: transparent;
    }

    .code-input:focus {
      border-color: transparent;
      box-shadow: none;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .reset-code-btn {
      padding: 2px 8px;
      font-size: 11px;
      height: 24px;
      background: var(--danger-bg);
      color: var(--danger-fg);
      border-color: var(--danger-fg);
      opacity: 0.8;
    }

    .reset-code-btn:hover {
      background: var(--danger-fg);
      color: #fff;
      opacity: 1;
    }

    .stdin-input {
      min-height: 60px;
      font-family: "Noto Sans", "Segoe UI", "Noto Color Emoji", "Twemoji Mozilla", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
      word-spacing: 0;
      font-variant-ligatures: none;
    }

    .output-box {
      min-height: 60px;
      font-family: "Noto Sans", "Segoe UI", "Noto Color Emoji", "Twemoji Mozilla", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
      word-spacing: 0;
      font-variant-ligatures: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .run-panel-top {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .run-controls {
      gap: 6px;
    }

    .run-controls > button {
      padding: 6px 10px;
      min-height: 34px;
      font-size: 13px;
      border-radius: 8px;
      line-height: 1.15;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .task-grid,
    .subtask-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .subtask-grid {
      margin-top: 6px;
      min-height: 40px;
    }

    .subtask-grid[hidden] {
      display: none !important;
    }

    .task-text-wrap[hidden] {
      display: none !important;
    }

    .task-text-wrap {
      margin-top: 6px;
      display: grid;
      gap: 4px;
    }

    .task-text-label {
      font-size: 14px;
      font-weight: 700;
    }

    .task-text {
      min-height: 72px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: 0;
      word-spacing: 0;
      font-variant-ligatures: none;
    }

    .task-text p {
      margin: 0;
    }

    .task-text p + p {
      margin-top: 4px;
    }

    .tests-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .test-list {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .test-item {
      border: 1px solid #dbeafe;
      background: #f8fafc;
      border-radius: 10px;
      padding: 8px;
      display: grid;
      gap: 6px;
      min-height: 150px;
      align-content: start;
    }

    .test-item-output {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      padding: 6px;
      display: grid;
      gap: 6px;
    }

    .test-item-output[hidden] {
      display: none !important;
    }

    .test-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .test-label {
      font-size: 13px;
      font-weight: 800;
      color: #334155;
    }

    .icon-btn {
      min-width: 34px;
      min-height: 34px;
      padding: 4px 6px;
      display: inline-grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      border-radius: 8px;
    }

    .test-output-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .test-output-card {
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #f8fafc;
      padding: 8px;
      display: grid;
      gap: 6px;
      min-height: 150px;
      align-content: start;
    }

    .test-output-head {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .test-output-card.ok {
      border-color: #86efac;
      background: #f0fdf4;
    }

    .test-output-card.error {
      border-color: #fca5a5;
      background: #fef2f2;
    }

    .test-output-card.warn {
      border-color: #fcd34d;
      background: #fffbeb;
    }

    .test-output-meta {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
    }

    .test-output-card.ok .test-output-meta {
      color: #166534;
    }

    .test-item-output.ok {
      border-color: #86efac;
      background: #f0fdf4;
    }

    .test-item-output.error {
      border-color: #fca5a5;
      background: #fef2f2;
    }

    .test-item-output.warn {
      border-color: #fcd34d;
      background: #fffbeb;
    }

    .test-item-output.ok .test-output-meta {
      color: #166534;
    }

    .test-item-output.error .test-output-meta {
      color: #991b1b;
    }

    .test-item-output.warn .test-output-meta {
      color: #92400e;
    }

    .inline-output-label {
      font-size: 11px;
      font-weight: 800;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .test-output-card.error .test-output-meta {
      color: #991b1b;
    }

    .test-output-card.warn .test-output-meta {
      color: #92400e;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      transition: 120ms ease;
    }

    button:hover {
      border-color: #9ca3af;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .switchers button[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .switchers button[aria-pressed="true"]:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .status-box {
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-weight: 700;
      background: #f3f4f6;
      color: #1f2937;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .status-box.ok {
      background: var(--ok-bg);
      color: var(--ok-fg);
      border-color: #86efac;
    }

    .status-box.error {
      background: var(--danger-bg);
      color: var(--danger-fg);
      border-color: #fca5a5;
    }

    .status-box.warn {
      background: var(--warn-bg);
      color: var(--warn-fg);
      border-color: #fcd34d;
    }

    .run-panel-top .status-box {
      min-height: 44px;
      padding: 6px 10px;
      font-size: 13px;
      line-height: 1.3;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      align-self: stretch;
    }

    .step-count {
      font-weight: 700;
      color: #1f2937;
      font-size: 14px;
    }

    .keyboard {
      display: grid;
      gap: 10px;
    }

    .keyboard-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 10px;
      align-items: start;
    }

    .keyboard-left {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .emoji-group {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
    }

    .emoji-group.group-1 { background: linear-gradient(180deg, #ffffff, #f8fafc); }
    .emoji-group.group-2 { background: linear-gradient(180deg, #ffffff, #f9fafb); }
    .emoji-group.group-3 { background: linear-gradient(180deg, #ffffff, #eff6ff); }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
      gap: 6px;
    }

    .emoji-btn {
      font-family: var(--emoji-font);

      return getTask4Cases().filter((item) => item && item.visible);
    }

    function getTask4VisibleInputs() {
      return getTask4VisibleCases().map((item) => String(item.input || ""));
    }

    function getTask4Phrase() {
      return TASK4_DATA && typeof TASK4_DATA.phrase === "string" ? TASK4_DATA.phrase : "";

    function syncTask4TestsUi() {
      const lockTests = isTask4Subtask();
      if (addTestBtn) addTestBtn.hidden = lockTests;

    function makeError(kind, line, message) {
      const err = new Error(message);
      err.kind = kind;
      err.line = line;
      return err;
    }

    function normalizeCodeLine(line) {
      return String(line || "").replace(/\uFE0F/g, "").replace(/\s+/g, "");
    }

    function requireVariable(symbol, line) {
      if (!VARIABLE_SET.has(symbol)) {
        throw makeError("parse", line, `Ожидалась переменная, получено: ${symbol || "пусто"}.`);
      }
      return symbol;
    }

    function parseEmojiNumber(emojis, line) {
      if (!emojis.length) {
        throw makeError("parse", line, "Команда 🌞 требует хотя бы одну emoji-цифру.");
      }
      let valueText = "";
      for (let i = 0; i < emojis.length; i++) {
        const value = DIGIT_TO_VALUE.get(emojis[i]);
        if (typeof value !== "string") {
          throw makeError("parse", line, `Неизвестная emoji-цифра: ${emojis[i]}.`);
        }
        valueText += value;
      }
      const numeric = Number(valueText);
      if (!Number.isFinite(numeric)) {
        throw makeError("parse", line, `Число не удалось распознать: ${valueText}.`);
      }
      return Math.trunc(numeric);
    }

    function toEmojiNumberText(value) {
      const safe = Math.max(0, Math.trunc(value));
      const text = String(safe);
      let out = "";
      for (let i = 0; i < text.length; i++) {
        const code = text.charCodeAt(i) - 48;
        if (code >= 0 && code <= 9) out += DIGIT_EMOJIS[code];
      }
      return out || DIGIT_EMOJIS[0];
    }

    function editorLineCount() {
      const source = String(codeInputEl.value || "").replace(/\r\n?/g, "\n");
      return source.split("\n").length;
    }

    function syncCodeLineNumbersScroll() {
      if (!codeLineNumbersEl) return;
      codeLineNumbersEl.scrollTop = codeInputEl.scrollTop;
    }

    function syncCodeLineNumbersHeight() {
      if (!codeLineNumbersEl) return;
      const nextHeight = codeInputEl.offsetHeight;
      if (nextHeight > 0) codeLineNumbersEl.style.height = `${nextHeight}px`;
    }

    function refreshCodeLineNumbers() {
      if (!codeLineNumbersEl) return;
      const lines = [];
      const total = editorLineCount();
      for (let i = 1; i <= total; i++) lines.push(toEmojiNumberText(i));
      const content = lines.join("\n");
      if (codeLineNumbersEl.value !== content) codeLineNumbersEl.value = content;
      syncCodeLineNumbersHeight();
      syncCodeLineNumbersScroll();
    }

    function parseProgram(source) {
      const lines = String(source || "").replace(/\r\n?/g, "\n").split("\n");
      const instructions = [];
      const blockStack = [];

      for (let idx = 0; idx < lines.length; idx++) {
        const lineNo = idx + 1;
        const compactLine = normalizeCodeLine(lines[idx]);
        if (!compactLine) continue;

        const tokens = Array.from(compactLine);
        const op = tokens[0];

        if (op === "🌞") {
          if (tokens.length < 3) {
            throw makeError("parse", lineNo, "Команда 🌞 требует формат: 🌞<переменная><emoji-число>.");
          }
          const target = requireVariable(tokens[1], lineNo);
          const value = parseEmojiNumber(tokens.slice(2), lineNo);
          instructions.push({ type: "set", target, value, line: lineNo });
          continue;
        }

        if (op === "⭐") {
          if (tokens.length !== 2) throw makeError("parse", lineNo, "Команда ⭐ требует формат: ⭐<переменная>.");
          instructions.push({ type: "readNumber", target: requireVariable(tokens[1], lineNo), line: lineNo });
          continue;
        }

        if (op === "🎲") {
          if (tokens.length !== 4) throw makeError("parse", lineNo, "Команда 🎲 требует формат: 🎲<переменная><lowVar><highVar>.");
          instructions.push({
            type: "random",
            target: requireVariable(tokens[1], lineNo),
            low: requireVariable(tokens[2], lineNo),
            high: requireVariable(tokens[3], lineNo),
            line: lineNo
          });
          continue;
        }

        if (op === "😀") {
          if (tokens.length !== 2) throw makeError("parse", lineNo, "Команда 😀 требует формат: 😀<переменная>.");
          instructions.push({ type: "printNumber", target: requireVariable(tokens[1], lineNo), line: lineNo });
          continue;
        }

        if (op === "➕" || op === "➖" || op === "✖" || op === "➗" || op === "➰") {
          if (tokens.length !== 3) {
            throw makeError("parse", lineNo, `Команда ${op} требует формат: ${op}<переменная><переменная>.`);
          }
          instructions.push({
            type: "math",
            op,
            left: requireVariable(tokens[1], lineNo),
            right: requireVariable(tokens[2], lineNo),
            line: lineNo
          });
          continue;
        }

        if (op === "🤔") {
          if (tokens.length !== 3) throw makeError("parse", lineNo, "Команда 🤔 требует формат: 🤔<переменная><переменная>.");
          instructions.push({
            type: "ifEq",
            left: requireVariable(tokens[1], lineNo),
            right: requireVariable(tokens[2], lineNo),
            jumpTo: -1,
            line: lineNo
          });
          blockStack.push({ type: "if", index: instructions.length - 1 });
          continue;
        }

        if (op === "🔂") {
          if (tokens.length !== 2) throw makeError("parse", lineNo, "Команда 🔂 требует формат: 🔂<переменная>.");
          instructions.push({
            type: "loopCount",
            count: requireVariable(tokens[1], lineNo),
            jumpTo: -1,
            line: lineNo
          });
          blockStack.push({ type: "loopCount", index: instructions.length - 1 });
          continue;
        }

        if (op === "🔁") {
          if (tokens.length !== 3) throw makeError("parse", lineNo, "Команда 🔁 требует формат: 🔁<переменная><переменная>.");
          instructions.push({
            type: "loopNeq",
            left: requireVariable(tokens[1], lineNo),
            right: requireVariable(tokens[2], lineNo),
            jumpTo: -1,
            line: lineNo
          });
          blockStack.push({ type: "loopNeq", index: instructions.length - 1 });
          continue;
        }

        if (op === "😐") {
          if (tokens.length !== 1) throw makeError("parse", lineNo, "Команда 😐 не принимает аргументы.");
          if (!blockStack.length) throw makeError("parse", lineNo, "Лишний 😐 без открывающего 🤔, 🔂 или 🔁.");
          const block = blockStack.pop();
          if (block.type === "if") {
            instructions.push({ type: "ifEnd", ifIndex: block.index, line: lineNo });
          } else if (block.type === "loopCount") {
            instructions.push({ type: "loopCountEnd", loopIndex: block.index, line: lineNo });
          } else {
            instructions.push({ type: "loopEnd", loopIndex: block.index, line: lineNo });
          }
          const endIndex = instructions.length - 1;
          instructions[block.index].jumpTo = endIndex + 1;
          continue;
        }

        throw makeError("parse", lineNo, `Неизвестная команда: ${op}.`);
      }

      if (blockStack.length) {
        const firstBlock = blockStack[0];
        const firstUnclosed = instructions[firstBlock.index];
        const opener = firstBlock.type === "if" ? "🤔" : (firstBlock.type === "loopCount" ? "🔂" : "🔁");
        throw makeError("parse", firstUnclosed.line, `Блок ${opener} не закрыт командой 😐.`);
      }

      return instructions;
    }

    function initialVariables() {
      const out = {};
      for (let i = 0; i < VARIABLE_EMOJIS.length; i++) out[VARIABLE_EMOJIS[i]] = 0;
      return out;
    }

    function assertFiniteNumber(value, line, context) {
      if (!Number.isFinite(value)) {
        throw makeError("runtime", line, `${context}: получено нечисловое значение.`);
      }
      return Math.trunc(value);
    }

    function isAsciiDigit(ch) {
      return ch >= "0" && ch <= "9";
    }

    function readNextInputNumber(inputText, state, line) {
      let idx = state.index;
      while (idx < inputText.length && /\s/u.test(inputText[idx])) idx += 1;

      if (idx >= inputText.length) {
        throw makeError("runtime", line, "Команда ⭐ не может читать из пустых входных данных.");
      }

      let valueText = "";
      while (idx < inputText.length && isAsciiDigit(inputText[idx])) {
        valueText += inputText[idx];
        idx += 1;
      }

      if (!valueText) {
        const got = inputText[idx];
        throw makeError("runtime", line, `Команда ⭐ ожидает число, получено: ${got}.`);
      }

      state.index = idx;
      const parsed = Number(valueText);
      return assertFiniteNumber(parsed, line, "Команда ⭐");
    }

    function setStatus(kind, message) {
      statusBoxEl.className = `status-box ${kind}`;

    function pluralRu(count, one, few, many) {
      const n = Math.abs(Number(count) || 0);
      const mod100 = n % 100;
      const mod10 = n % 10;
      if (mod100 >= 11 && mod100 <= 14) return many;
      if (mod10 === 1) return one;
      if (mod10 >= 2 && mod10 <= 4) return few;
      return many;
    }

    function hideCodePhrasePanel() {
      if (!codePhrasePanelEl) return;
      codePhrasePanelEl.hidden = true;
      if (codePhraseInputEl) codePhraseInputEl.value = "";
    }

    function showCodePhrasePanel(phrase) {
      if (!codePhrasePanelEl || !codePhraseInputEl) return;
      const text = String(phrase || "");
      if (!text) {
        hideCodePhrasePanel();
        return;

      codePhrasePanelEl.hidden = false;
    }

    function normalizeUnlockToken(value) {
      return String(value || "").trim();
    }

    function createRunNonce() {
      if (typeof crypto !== "undefined" && crypto && typeof crypto.getRandomValues === "function") {
        const bytes = new Uint32Array(2);
        crypto.getRandomValues(bytes);
        return `${Date.now().toString(36)}:${bytes[0].toString(36)}:${bytes[1].toString(36)}`;
      }
      return `${Date.now().toString(36)}:${Math.random().toString(36).slice(2)}`;
    }

    function hashTextFNV1a32(text) {
      const src = String(text || "");
      let hash = 0x811c9dc5;
      for (let i = 0; i < src.length; i++) {
        hash ^= src.charCodeAt(i);
        hash = Math.imul(hash, 0x01000193);
      }
      return (hash >>> 0).toString(16).padStart(8, "0");
    }

    function buildRunResultProof(nonce, testIndex, testInput, kind, value) {
      return hashTextFNV1a32([
        String(nonce || ""),
        String(testIndex),
        normalizeUnlockToken(testInput),
        String(kind || ""),
        normalizeUnlockToken(value)
      ].join("::"));
    }

    function makeUnlockProof(subtaskKey, tests, outputs) {
      return `${subtaskKey}::${tests.join("|")}::${outputs.join("|")}::LOVELACE`;
    }

    function deriveUnlockMasks(length, proof, seed) {
      let state = seed >>> 0;
      for (let i = 0; i < proof.length; i++) {
        state ^= proof.charCodeAt(i);
        state = (Math.imul((state + 0x9e3779b9) >>> 0, 1664525) + 1013904223) >>> 0;
      }

      const masks = [];
      for (let i = 0; i < length; i++) {
        state = (Math.imul((state ^ ((i + 1) * 0x45d9f3b)) >>> 0, 1597334677) + 12345) >>> 0;
        masks.push((state >>> 8) & 0xffff);
      }
      return masks;
    }

    function decodeUnlockPhrase(subtaskKey, rule) {
      if (!rule || !Array.isArray(rule.blob) || !rule.blob.length) return "";
      const proof = makeUnlockProof(subtaskKey, rule.tests, rule.outputs);
      const masks = deriveUnlockMasks(rule.blob.length, proof, rule.seed);
      let text = "";
      for (let i = 0; i < rule.blob.length; i++) {
        text += String.fromCharCode(rule.blob[i] ^ masks[i]);
      }
      return text;
    }

    function isCodePhraseSolved(subtaskKey, tests, results, runNonce) {
      const key = String(subtaskKey || "");
      const rule = CODE_PHRASE_UNLOCK_RULES[key];
      if (!rule) return false;
      if (!Array.isArray(tests) || !Array.isArray(results)) return false;
      if (!runNonce) return false;
      if (tests.length !== rule.tests.length) return false;
      if (results.length !== rule.outputs.length) return false;

      for (let i = 0; i < rule.tests.length; i++) {
        if (normalizeUnlockToken(tests[i]) !== rule.tests[i]) return false;
        const result = results[i];
        if (!result || result.kind !== "ok" || result.source !== "runtime") return false;
        const expectedProof = buildRunResultProof(runNonce, i, tests[i], result.kind, result.value);
        if (result.proof !== expectedProof) return false;
        if (normalizeUnlockToken(result.value) !== rule.outputs[i]) return false;
      }

      return true;
    }

    function pickTask4VisibleResults(cases, results) {
      if (!Array.isArray(cases) || !Array.isArray(results)) return [];
      const out = [];
      for (let i = 0; i < cases.length; i++) {
        if (!cases[i] || !cases[i].visible) continue;
        const result = results[i];
        if (!result) continue;
        out.push(result);
      }
      return out;
    }

    function countTask4Matches(cases, results) {
      if (!Array.isArray(cases) || !Array.isArray(results) || results.length !== cases.length) return 0;
      let matched = 0;
      for (let i = 0; i < cases.length; i++) {
        const result = results[i];
        const expected = normalizeUnlockToken(cases[i] && cases[i].expected);
        if (!result || result.kind !== "ok" || result.source !== "runtime") continue;
        if (normalizeUnlockToken(result.value) === expected) matched += 1;
      }
      return matched;
    }

    function isTask4Solved(cases, results) {
      return Array.isArray(cases) && cases.length > 0 && countTask4Matches(cases, results) === cases.length;
    }

    function renumberTests() {

    function renderOutputs(results) {

      const testItems = Array.from(testListEl.querySelectorAll(".test-item"));
      for (let i = 0; i < results.length; i++) {

    async function executeProgram(instructions, inputText) {
      const vars = initialVariables();
      const normalizedInput = String(inputText || "");
      const inputState = { index: 0 };
      const loopCountState = new Map();
      let output = "";
      let pc = 0;
      let steps = 0;

      while (pc < instructions.length) {
        if (steps >= HARD_STEP_LIMIT) {
          return {
            status: "limit",
            message: `Превышен внутренний лимит шагов (${HARD_STEP_LIMIT}).`,
            steps,
            output,
            vars
          };
        }

        const ins = instructions[pc];
        steps += 1;

        if (ins.type === "set") {
          vars[ins.target] = ins.value;
          pc += 1;
        } else if (ins.type === "readNumber") {
          vars[ins.target] = readNextInputNumber(normalizedInput, inputState, ins.line);
          pc += 1;
        } else if (ins.type === "random") {
          const low = assertFiniteNumber(vars[ins.low], ins.line, "Команда 🎲 (нижняя граница)");
          const high = assertFiniteNumber(vars[ins.high], ins.line, "Команда 🎲 (верхняя граница)");
          if (low > high) {
            throw makeError("runtime", ins.line, `Команда 🎲: low (${low}) больше high (${high}).`);
          }
          const value = low + Math.floor(Math.random() * (high - low + 1));
          vars[ins.target] = assertFiniteNumber(value, ins.line, "Команда 🎲 (результат)");
          pc += 1;
        } else if (ins.type === "printNumber") {
          const value = assertFiniteNumber(vars[ins.target], ins.line, "Команда 😀");
          output += String(value);
          pc += 1;
        } else if (ins.type === "math") {
          const left = assertFiniteNumber(vars[ins.left], ins.line, `Команда ${ins.op}`);
          const right = assertFiniteNumber(vars[ins.right], ins.line, `Команда ${ins.op}`);
          let result = 0;

          if (ins.op === "➕") result = left + right;
          else if (ins.op === "➖") result = left - right;
          else if (ins.op === "✖") result = left * right;
          else if (ins.op === "➗") {
            if (right === 0) throw makeError("runtime", ins.line, "Команда ➗: деление на ноль.");
            result = Math.trunc(left / right);
          } else if (ins.op === "➰") {
            if (right === 0) throw makeError("runtime", ins.line, "Команда ➰: деление на ноль.");
            result = left % right;
          }

          vars[ins.left] = assertFiniteNumber(result, ins.line, `Команда ${ins.op}`);
          pc += 1;
        } else if (ins.type === "ifEq") {
          const left = assertFiniteNumber(vars[ins.left], ins.line, "Команда 🤔");
          const right = assertFiniteNumber(vars[ins.right], ins.line, "Команда 🤔");
          if (left === right) pc += 1;
          else pc = ins.jumpTo;
        } else if (ins.type === "loopCount") {
          if (!loopCountState.has(pc)) {
            const total = assertFiniteNumber(vars[ins.count], ins.line, "Команда 🔂");
            loopCountState.set(pc, total);
          }
          const remaining = loopCountState.get(pc);
          if (remaining > 0) {
            loopCountState.set(pc, remaining - 1);
            pc += 1;
          } else {
            loopCountState.delete(pc);
            pc = ins.jumpTo;
          }
        } else if (ins.type === "loopNeq") {
          const left = assertFiniteNumber(vars[ins.left], ins.line, "Команда 🔁");
          const right = assertFiniteNumber(vars[ins.right], ins.line, "Команда 🔁");
          if (left !== right) pc += 1;
          else pc = ins.jumpTo;
        } else if (ins.type === "ifEnd") {
          pc += 1;
        } else if (ins.type === "loopCountEnd") {
          pc = ins.loopIndex;
        } else if (ins.type === "loopEnd") {
          pc = ins.loopIndex;
        } else {
          throw makeError("runtime", ins.line, `Неизвестная инструкция типа ${ins.type}.`);
        }

        if (steps % YIELD_EVERY === 0) {
          await new Promise((resolve) => setTimeout(resolve, 0));
        }
      }

      return {
        status: "ok",
        message: "Выполнение завершено.",
        steps,
        output,
        vars
      };
    }

    function updateFocusTarget(target) {
      if (target === codeInputEl) lastFocusedField = target;
    }

    function resolveInsertTarget() {
      if (lastFocusedField === codeInputEl) return lastFocusedField;
      return codeInputEl;
    }

    function insertEmoji(emoji) {
      const target = resolveInsertTarget();
      target.focus();
      const start = typeof target.selectionStart === "number" ? target.selectionStart : target.value.length;
      const end = typeof target.selectionEnd === "number" ? target.selectionEnd : target.value.length;
      target.setRangeText(emoji, start, end, "end");
      updateFocusTarget(target);
      if (target === codeInputEl) refreshCodeLineNumbers();
    }

    function focusCodeInput() {
      codeInputEl.focus();
      updateFocusTarget(codeInputEl);
      return codeInputEl;
    }

    function getSelectionRange(target) {
      const start = typeof target.selectionStart === "number" ? target.selectionStart : target.value.length;
      const end = typeof target.selectionEnd === "number" ? target.selectionEnd : start;
      return { start, end };
    }

    function findLineStart(text, pos) {
      if (pos <= 0) return 0;
      const idx = text.lastIndexOf("\n", pos - 1);
      return idx === -1 ? 0 : idx + 1;
    }

    function findLineEnd(text, pos) {
      const idx = text.indexOf("\n", pos);
      return idx === -1 ? text.length : idx;
    }

    function getGraphemeBoundaries(text) {
      const src = String(text || "");
      const boundaries = [0];
      if (!src.length) return boundaries;

      if (GRAPHEME_SEGMENTER) {
        const segments = GRAPHEME_SEGMENTER.segment(src);
        for (const item of segments) {
          const end = item.index + item.segment.length;
          if (end > boundaries[boundaries.length - 1]) boundaries.push(end);
        }
      } else {
        let idx = 0;
        for (const ch of src) {
          idx += ch.length;
          boundaries.push(idx);
        }
      }

      if (boundaries[boundaries.length - 1] !== src.length) boundaries.push(src.length);
      return boundaries;
    }

    function boundaryAtOrBefore(text, pos) {
      const src = String(text || "");
      const clamped = Math.max(0, Math.min(src.length, pos));
      const boundaries = getGraphemeBoundaries(src);
      let out = 0;
      for (let i = 0; i < boundaries.length; i++) {
        const b = boundaries[i];
        if (b <= clamped) out = b;
        else break;
      }
      return out;
    }

    function boundaryAtOrAfter(text, pos) {
      const src = String(text || "");
      const clamped = Math.max(0, Math.min(src.length, pos));
      const boundaries = getGraphemeBoundaries(src);
      for (let i = 0; i < boundaries.length; i++) {
        const b = boundaries[i];
        if (b >= clamped) return b;
      }
      return src.length;
    }

    function previousBoundary(text, pos) {
      const src = String(text || "");
      const clamped = Math.max(0, Math.min(src.length, pos));
      const boundaries = getGraphemeBoundaries(src);
      let out = 0;
      for (let i = 0; i < boundaries.length; i++) {
        const b = boundaries[i];
        if (b < clamped) out = b;
        else break;
      }
      return out;
    }

    function nextBoundary(text, pos) {
      const src = String(text || "");
      const clamped = Math.max(0, Math.min(src.length, pos));
      const boundaries = getGraphemeBoundaries(src);
      for (let i = 0; i < boundaries.length; i++) {
        const b = boundaries[i];
        if (b > clamped) return b;
      }
      return src.length;
    }

    function graphemeIndexAtPosition(text, pos) {
      const src = String(text || "");
      const clamped = Math.max(0, Math.min(src.length, pos));
      const boundaries = getGraphemeBoundaries(src);
      let idx = 0;
      for (let i = 0; i < boundaries.length; i++) {
        if (boundaries[i] <= clamped) idx = i;
        else break;
      }
      return idx;
    }

    function positionAtGraphemeIndex(text, index) {
      const boundaries = getGraphemeBoundaries(text);
      const safeIdx = Math.max(0, Math.min(index, boundaries.length - 1));
      return boundaries[safeIdx];
    }

    function graphemeRangeContaining(text, pos) {
      const src = String(text || "");
      if (!src.length) return { start: 0, end: 0 };
      const clamped = Math.max(0, Math.min(src.length - 1, pos));
      const boundaries = getGraphemeBoundaries(src);
      for (let i = 0; i < boundaries.length - 1; i++) {
        const start = boundaries[i];
        const end = boundaries[i + 1];
        if (clamped >= start && clamped < end) return { start, end };
      }
      const last = boundaries[boundaries.length - 1];
      return { start: last, end: last };
    }

    function moveCaretHorizontal(delta) {
      const target = focusCodeInput();
      const text = target.value;
      const { start, end } = getSelectionRange(target);
      let next = start;
      if (delta < 0) {
        if (start !== end) {
          next = boundaryAtOrBefore(text, Math.min(start, end));
        } else {
          next = previousBoundary(text, start);
        }
      } else {
        if (start !== end) {
          next = boundaryAtOrAfter(text, Math.max(start, end));
        } else {
          next = nextBoundary(text, end);
        }
      }
      target.setSelectionRange(next, next);
      updateFocusTarget(target);
    }

    function moveCaretVertical(delta) {
      const target = focusCodeInput();
      const text = target.value;
      const { start, end } = getSelectionRange(target);
      const base = delta < 0 ? Math.min(start, end) : Math.max(start, end);
      const currStart = findLineStart(text, base);
      const currEnd = findLineEnd(text, base);
      const currLine = text.slice(currStart, currEnd);
      const currRel = Math.max(0, Math.min(currLine.length, base - currStart));
      const currCol = graphemeIndexAtPosition(currLine, currRel);
      let next = base;

      if (delta < 0) {
        if (currStart === 0) {
          next = 0;
        } else {
          const prevEnd = currStart - 1;
          const prevStart = findLineStart(text, prevEnd);
          const prevLine = text.slice(prevStart, prevEnd);
          const prevRel = positionAtGraphemeIndex(prevLine, currCol);
          next = prevStart + prevRel;
        }
      } else {
        if (currEnd >= text.length) {
          next = text.length;
        } else {
          const nextStart = currEnd + 1;
          const nextEnd = findLineEnd(text, nextStart);
          const nextLine = text.slice(nextStart, nextEnd);
          const nextRel = positionAtGraphemeIndex(nextLine, currCol);
          next = nextStart + nextRel;
        }
      }

      target.setSelectionRange(next, next);
      updateFocusTarget(target);
    }

    function insertCodeText(text) {
      const target = focusCodeInput();
      const { start, end } = getSelectionRange(target);
      target.setRangeText(text, start, end, "end");
      updateFocusTarget(target);
      refreshCodeLineNumbers();
    }

    function backspaceInCodeInput() {
      const target = focusCodeInput();
      const text = target.value;
      const { start, end } = getSelectionRange(target);
      if (start !== end) {
        const delStart = boundaryAtOrBefore(text, Math.min(start, end));
        const delEnd = boundaryAtOrAfter(text, Math.max(start, end));
        target.setRangeText("", delStart, delEnd, "end");
      } else if (start > 0) {
        const range = graphemeRangeContaining(text, start - 1);
        target.setRangeText("", range.start, range.end, "end");
      }
      updateFocusTarget(target);
      refreshCodeLineNumbers();
    }

    function deleteInCodeInput() {
      const target = focusCodeInput();
      const text = target.value;
      const { start, end } = getSelectionRange(target);
      if (start !== end) {
        const delStart = boundaryAtOrBefore(text, Math.min(start, end));
        const delEnd = boundaryAtOrAfter(text, Math.max(start, end));
        target.setRangeText("", delStart, delEnd, "end");
      } else if (start < text.length) {
        const range = graphemeRangeContaining(text, start);
        target.setRangeText("", range.start, range.end, "end");
      }
      updateFocusTarget(target);
      refreshCodeLineNumbers();
    }

    async function handleRun() {
      runBtn.disabled = true;
      hideCodePhrasePanel();
      setStatus("", "Парсинг программы...");
      stepCountEl.textContent = "Суммарные шаги: 0";
      const runNonce = createRunNonce();
      const task4Mode = isTask4Subtask();
      const task4Cases = task4Mode ? getTask4Cases() : [];
      if (task4Mode && !task4Cases.length) {
        renderOutputs([]);
        setStatus("error", "Ошибка.");
        runBtn.disabled = false;
        return;
      }

      const tests = task4Mode
        ? task4Cases.map((item) => String(item.input || ""))
        : getTestsFromUi();
      const hasAtLeastOneTest = tests.length > 0;
      if (!hasAtLeastOneTest && !task4Mode) {
        setTestsToUi([""]);
      }
      const safeTests = hasAtLeastOneTest ? tests : [""];

      let instructions = [];
      try {
        instructions = parseProgram(codeInputEl.value);
      } catch (err) {
        const msg = formatLineOnlyError(err);
        const failResults = safeTests.map(() => ({
          kind: "error",
          meta: "Ошибка",
          value: msg,
          source: "runtime",
          proof: ""
        }));
        const displayFailResults = task4Mode
          ? pickTask4VisibleResults(task4Cases, failResults)
          : failResults;
        renderOutputs(displayFailResults);
        setStatus("error", msg);
        runBtn.disabled = false;
        return;
      }

      setStatus("", `Инструкций: ${instructions.length}. Выполнение тестов...`);

      const results = [];
      let totalSteps = 0;
      let okCount = 0;
      let warnCount = 0;
      let errCount = 0;

      for (let i = 0; i < safeTests.length; i++) {
        try {
          const result = await executeProgram(instructions, safeTests[i]);
          totalSteps += result.steps;
          if (result.status === "ok") {
            okCount += 1;
            results.push({
              kind: "ok",
              meta: `Успех. Шаги: ${result.steps}`,
              value: result.output,
              source: "runtime",
              proof: buildRunResultProof(runNonce, i, safeTests[i], "ok", result.output)
            });
          } else if (result.status === "limit") {
            warnCount += 1;
            results.push({
              kind: "warn",
              meta: `Лимит шагов. Шаги: ${result.steps}`,
              value: result.output,
              source: "runtime",
              proof: buildRunResultProof(runNonce, i, safeTests[i], "warn", result.output)
            });
          } else {
            warnCount += 1;
            results.push({
              kind: "warn",
              meta: `Необычный статус. Шаги: ${result.steps}`,
              value: result.output,
              source: "runtime",
              proof: buildRunResultProof(runNonce, i, safeTests[i], "warn", result.output)
            });
          }
        } catch (err) {
          errCount += 1;
          const msg = formatLineOnlyError(err);
          results.push({
            kind: "error",
            meta: "Ошибка",
            value: msg,
            source: "runtime",
            proof: buildRunResultProof(runNonce, i, safeTests[i], "error", msg)
          });
        }
      }

      const displayResults = task4Mode
        ? pickTask4VisibleResults(task4Cases, results)
        : results;
      renderOutputs(displayResults);
      stepCountEl.textContent = `Суммарные шаги: ${totalSteps}`;
      const hasUnlockRule = Boolean(selectedSubtaskKey && CODE_PHRASE_UNLOCK_RULES[selectedSubtaskKey]);
      const solvedByRule = hasUnlockRule
        ? isCodePhraseSolved(selectedSubtaskKey, safeTests, results, runNonce)
        : false;
      const solvedByTask4 = task4Mode
        ? isTask4Solved(task4Cases, results)
        : false;
      const allDonePrefix = okCount === 1 ? "Готово:" : "Готово: все";
      const allDoneVerb = okCount === 1 ? "выполнен" : "выполнены";
      if (errCount > 0) {
        setStatus("error", `Готово: ${okCount} ${pluralRu(okCount, "успех", "успеха", "успехов")}, ${warnCount} ${pluralRu(warnCount, "предупреждение", "предупреждения", "предупреждений")}, ${errCount} ${pluralRu(errCount, "ошибка", "ошибки", "ошибок")}.`);
      } else if (warnCount > 0) {
        setStatus("warn", `Готово: ${okCount} ${pluralRu(okCount, "успех", "успеха", "успехов")}, ${warnCount} ${pluralRu(warnCount, "предупреждение", "предупреждения", "предупреждений")}.`);
      } else if (task4Mode && !solvedByTask4) {
        const matched = countTask4Matches(task4Cases, results);
        setStatus("warn", `Готово: совпало с эталоном ${matched} из ${task4Cases.length} ${pluralRu(task4Cases.length, "теста", "тестов", "тестов")}.`);
      } else if (hasUnlockRule && !solvedByRule) {
        setStatus("warn", `${allDonePrefix} ${okCount} ${pluralRu(okCount, "тест", "теста", "тестов")} ${allDoneVerb}, но эталон не совпал.`);
      } else {
        setStatus("ok", `${allDonePrefix} ${okCount} ${pluralRu(okCount, "тест", "теста", "тестов")} ${allDoneVerb} успешно.`);
      }

      if (task4Mode && solvedByTask4) {
        showCodePhrasePanel(getTask4Phrase());
      } else if (solvedByRule && selectedSubtaskKey) {
        const rule = CODE_PHRASE_UNLOCK_RULES[selectedSubtaskKey];
        const phrase = decodeUnlockPhrase(selectedSubtaskKey, rule);
        showCodePhrasePanel(phrase);
      }

      runBtn.disabled = false;
    }

    if (resetCodeBtnEl) {
      resetCodeBtnEl.addEventListener("click", () => {
        if (!selectedSubtaskKey || selectedExampleIndex >= 0) return;
        delete sessionSubtaskCodes[selectedSubtaskKey];
        applySubtaskPreset(selectedSubtaskKey);
      });
    }
    for (let i = 0; i < exampleButtons.length; i++) {
      exampleButtons[i].addEventListener("click", () => applyExample(i));
    }
    addTestBtn.addEventListener("click", () => {
      if (isTask4Subtask()) return;
      testListEl.appendChild(createTestItem(""));
      renumberTests();
      resetResultPanels();
    });
    resetTestsBtn.addEventListener("click", () => {
      if (isTask4Subtask()) return;
      setTestsToUi([""]);
      resetResultPanels();
    });
    if (copyCodePhraseBtn && codePhraseInputEl) {
      copyCodePhraseBtn.addEventListener("click", async () => {
        const text = String(codePhraseInputEl.value || "");
        if (!text) {
          setStatus("warn", "Кодовая фраза пуста.");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("ok", "Кодовая фраза скопирована.");
        } catch (_) {
          codePhraseInputEl.focus();
          codePhraseInputEl.select();
          setStatus("warn", "Копирование через буфер недоступно. Текст выделен для копирования.");
        }
      });
    }

    renderKeyboard();
    initTaskPlaceholders();
    setTestsToUi([""]);
    setScenarioKey("");
    resetResultPanels();
    refreshCodeLineNumbers();
    codeInputEl.focus();
    updateFocusTarget(codeInputEl);
  </script>
</body>
</html>
